  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><circle cx='16' cy='16' r='4' fill='%23c9a84c'/><line x1='16' y1='4' x2='16' y2='10' stroke='%23c9a84c' stroke-width='1.5' stroke-linecap='round'/><line x1='16' y1='22' x2='16' y2='28' stroke='%23c9a84c' stroke-width='1.5' stroke-linecap='round'/><line x1='4' y1='16' x2='10' y2='16' stroke='%23c9a84c' stroke-width='1.5' stroke-linecap='round'/><line x1='22' y1='16' x2='28' y2='16' stroke='%23c9a84c' stroke-width='1.5' stroke-linecap='round'/><line x1='7.5' y1='7.5' x2='11.8' y2='11.8' stroke='%23c9a84c' stroke-width='1.2' stroke-linecap='round'/><line x1='20.2' y1='20.2' x2='24.5' y2='24.5' stroke='%23c9a84c' stroke-width='1.2' stroke-linecap='round'/><line x1='24.5' y1='7.5' x2='20.2' y2='11.8' stroke='%23c9a84c' stroke-width='1.2' stroke-linecap='round'/><line x1='11.8' y1='20.2' x2='7.5' y2='24.5' stroke='%23c9a84c' stroke-width='1.2' stroke-linecap='round'/></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #0a0a0a; font-family: 'Courier New', monospace; height: 100%; }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #canvas-container canvas { display: block; position: absolute; top: 0; left: 0; }

    #bloom-canvas {
      pointer-events: none;
      filter: blur(6px);
      mix-blend-mode: screen;
      z-index: 1;
    }

    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: rgba(10, 10, 10, 0.92);
      border-left: 1px solid rgba(201, 168, 76, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      overflow-y: auto;
      padding: 24px 20px;
      color: #ccc;
      transition: transform 0.3s ease;
    }
    #sidebar.hidden { transform: translateX(100%); }

    #sidebar-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: #c9a84c;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #sidebar-toggle:hover { background: rgba(201, 168, 76, 0.15); }
    #sidebar:not(.hidden) ~ #sidebar-toggle { right: 290px; }

    .sidebar-title {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 4px;
    }
    .sidebar-subtitle {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.5);
      margin-bottom: 20px;
    }

    .control-group { margin-bottom: 16px; }
    .control-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.6);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .control-label span.val { color: #c9a84c; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(201, 168, 76, 0.15);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c9a84c;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c9a84c;
      border: none;
      cursor: pointer;
    }

    .seed-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    .seed-input {
      flex: 1;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: #c9a84c;
      padding: 6px 10px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      outline: none;
    }
    .seed-input:focus { border-color: rgba(201, 168, 76, 0.5); }

    .btn {
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.25);
      color: #c9a84c;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .btn:hover { background: rgba(201, 168, 76, 0.2); border-color: rgba(201, 168, 76, 0.5); }

    .btn-row { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .btn-row .btn { flex: 1; text-align: center; min-width: 70px; }

    .mode-toggle {
      display: flex;
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .mode-toggle button {
      flex: 1;

      text-transform: uppercase;
      transition: all 0.15s;
    }
    .mode-toggle button.active {
      background: rgba(201, 168, 76, 0.15);

    .divider { border: none; border-top: 1px solid rgba(201, 168, 76, 0.1); margin: 16px 0; }

    .embed-mode #sidebar,
    .embed-mode #sidebar-toggle { display: none !important; }

    .seg-count {
      font-size: 10px;
      color: rgba(201, 168, 76, 0.3);
      margin-top: 12px;
      text-align: center;
      letter-spacing: 1px;
    }

</head>
<body>
  <div id="canvas-container"></div>

  <button id="sidebar-toggle" title="Toggle controls">&#9776;</button>
  <div id="sidebar">
    <div class="sidebar-title">Neural Scintillation</div>
    <div class="sidebar-subtitle">Auric Dendriticism</div>

    <hr class="divider">

    <div class="control-label" style="margin-bottom: 6px;">Seed</div>
    <div class="seed-row">
      <input type="text" id="seed-input" class="seed-input" placeholder="Random seed">
      <button class="btn" id="seed-prev" title="Previous seed">&#8592;</button>
      <button class="btn" id="seed-next" title="Next seed">&#8594;</button>
      <button class="btn" id="seed-random" title="Random seed">&#x27F3;</button>
    </div>

    <div class="mode-toggle">
      <button id="mode-gold" class="active">Gold</button>
      <button id="mode-signal">Neural Signal</button>
    </div>

    <hr class="divider">

    <div class="control-group">
      <div class="control-label">Neuron Count <span class="val" id="val-neurons">18</span></div>
      <input type="range" id="ctrl-neurons" min="5" max="40" value="18" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Branch Depth <span class="val" id="val-depth">5</span></div>
      <input type="range" id="ctrl-depth" min="2" max="8" value="5" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Branch Spread <span class="val" id="val-spread">22</span>&deg;</div>
      <input type="range" id="ctrl-spread" min="5" max="45" value="22" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Line Density <span class="val" id="val-density">1.5</span></div>
      <input type="range" id="ctrl-density" min="0.5" max="3.0" value="1.5" step="0.1">
    </div>
    <div class="control-group">
      <div class="control-label">Light Speed <span class="val" id="val-speed">0.8</span>&deg;/f</div>
      <input type="range" id="ctrl-speed" min="0.1" max="3.0" value="0.8" step="0.1">
    </div>
    <div class="control-group">
      <div class="control-label">Glow Width <span class="val" id="val-glow">25</span>&deg;</div>
      <input type="range" id="ctrl-glow" min="5" max="60" value="25" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Decay Rate <span class="val" id="val-decay">0.88</span></div>
      <input type="range" id="ctrl-decay" min="0.70" max="0.99" value="0.88" step="0.01">
    </div>
    <div class="control-group">
      <div class="control-label">Bloom Intensity <span class="val" id="val-bloom">0.40</span></div>
      <input type="range" id="ctrl-bloom" min="0.0" max="1.0" value="0.40" step="0.05">
    </div>

    <hr class="divider">

    <div class="btn-row">
      <button class="btn" id="btn-regen">Regenerate</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-download">Download PNG</button>
    </div>

    <div class="seg-count" id="seg-count"></div>
  </div>

  <script>
    // --- Embed mode ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('embed') === 'true') {
      document.body.classList.add('embed-mode');
    }

    // =========================================================================
    // PARAMETERS — defaults from spec
    // =========================================================================
    const DEFAULTS = {
      neuronCount: 18,
      branchDepth: 5,
      branchSpread: 22,    // degrees
      lineDensity: 1.5,
      lightSpeed: 0.8,     // degrees per frame
      glowWidth: 25,       // degrees (sigma)
      decayRate: 0.88,
      bloomIntensity: 0.40
    };

    let params = { ...DEFAULTS };
    let colorMode = 'gold';
    let currentSeed = Math.floor(Math.random() * 999999);

    // =========================================================================
    // GEOMETRY STORAGE — generated once, immutable until regenerate
    // =========================================================================
    let segments = [];     // { x1, y1, x2, y2, nx, ny, thick }
    let brightness = null; // Float32Array, same length as segments
    let somaList = [];     // { x, y, nearSegStart, nearSegEnd }
    let lightAngle = 0;    // radians, current sweep position

    // Bloom canvas (raw, CSS-blurred)
    let bloomCanvas, bloomCtx;

    // =========================================================================
    // SEEDED RNG — mulberry32
    // =========================================================================
    function mulberry32(a) {
      return function () {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // =========================================================================
    // POISSON DISK SAMPLING
    // =========================================================================
    function poissonDiskSample(w, h, minDist, count, rng) {
      const points = [];
      const cellSize = minDist / Math.SQRT2;
      const gridW = Math.ceil(w / cellSize);
      const gridH = Math.ceil(h / cellSize);
      const grid = new Int32Array(gridW * gridH).fill(-1);
      const active = [];

      const margin = minDist * 0.4;
      const x0 = margin + rng() * (w - 2 * margin);
      const y0 = margin + rng() * (h - 2 * margin);
      points.push({ x: x0, y: y0 });
      active.push(0);
      grid[Math.floor(x0 / cellSize) + Math.floor(y0 / cellSize) * gridW] = 0;

      while (active.length > 0 && points.length < count * 3) {
        const ai = Math.floor(rng() * active.length);
        const p = points[active[ai]];
        let found = false;

        for (let attempt = 0; attempt < 30; attempt++) {
          const ang = rng() * Math.PI * 2;
          const dist = minDist + rng() * minDist;
          const nx = p.x + Math.cos(ang) * dist;
          const ny = p.y + Math.sin(ang) * dist;

          if (nx < margin || nx >= w - margin || ny < margin || ny >= h - margin) continue;

          const gx = Math.floor(nx / cellSize);
          const gy = Math.floor(ny / cellSize);
          let ok = true;

          outer:
          for (let dy = -2; dy <= 2; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
              const cx = gx + dx, cy = gy + dy;
              if (cx < 0 || cx >= gridW || cy < 0 || cy >= gridH) continue;
              const ci = grid[cx + cy * gridW];
              if (ci !== -1) {
                const ddx = nx - points[ci].x, ddy = ny - points[ci].y;
                if (ddx * ddx + ddy * ddy < minDist * minDist) { ok = false; break outer; }
              }
            }
          }

          if (ok) {
            const ni = points.length;
            points.push({ x: nx, y: ny });
            active.push(ni);
            grid[gx + gy * gridW] = ni;
            found = true;
            break;
          }
        }

        if (!found) active.splice(ai, 1);
      }

      return points.slice(0, count);
    }

    // =========================================================================
    // GEOMETRY GENERATION — runs once per seed/param change
    // =========================================================================
    function generateNetwork(cw, ch) {
      segments = [];
      somaList = [];
      const rng = mulberry32(currentSeed);

      // Seed p5's noise for Perlin sampling
      noiseSeed(currentSeed);

      const minDist = Math.min(cw, ch) / (Math.sqrt(params.neuronCount) * 1.1);
      const somas = poissonDiskSample(cw, ch, minDist, params.neuronCount, rng);

      // Base segment length scales with canvas
      const baseLen = Math.min(cw, ch) * 0.12;

      for (const soma of somas) {
        const segStart = segments.length;
        // 3-6 primary axons per soma
        const numPrimary = 3 + Math.floor(rng() * 4);
        for (let i = 0; i < numPrimary; i++) {
          const angle = (i / numPrimary) * Math.PI * 2 + (rng() - 0.5) * 0.6;
          growBranch(soma.x, soma.y, angle, baseLen, params.branchDepth, 2.2, rng);
        }
        somaList.push({ x: soma.x, y: soma.y, segStart, segEnd: segments.length });
      }

      // Allocate brightness array
      brightness = new Float32Array(segments.length);

      document.getElementById('seg-count').textContent = segments.length.toLocaleString() + ' segments';
    }

    function growBranch(x, y, angle, length, depth, thickness, rng) {
      if (depth <= 0 || thickness < 0.15) return;

      // Number of sub-segments per branch — controlled by line density
      const numSubs = Math.max(3, Math.round(length / (8 / params.lineDensity)));
      const stepLen = length / numSubs;

      let cx = x, cy = y;
      let cAngle = angle;

      for (let i = 0; i < numSubs; i++) {
        // Perlin noise perturbation for organic curvature
        const noiseVal = noise(cx * 0.005, cy * 0.005, currentSeed * 0.001);
        cAngle += (noiseVal - 0.5) * 0.8;

        const nx = cx + Math.cos(cAngle) * stepLen;
        const ny = cy + Math.sin(cAngle) * stepLen;

        // Pre-compute unit normal (perpendicular to segment direction)
        const dx = nx - cx;
        const dy = ny - cy;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;

        segments.push({
          x1: cx, y1: cy,
          x2: nx, y2: ny,
          nx: -dy / len,  // normal X
          ny: dx / len,   // normal Y
          thick: thickness * (1 - (i / numSubs) * 0.3)
        });

        cx = nx;
        cy = ny;
      }

      // Branch into 2-4 children
      if (depth > 1) {
        const spreadRad = params.branchSpread * Math.PI / 180;
        // Always produce at least 2 children; sometimes 3-4
        const numChildren = 2 + (rng() < 0.4 ? 1 : 0) + (rng() < 0.15 ? 1 : 0);
        const childLen = length * (0.65 + rng() * 0.15);
        const childThick = thickness * (0.62 + rng() * 0.1);

        for (let c = 0; c < numChildren; c++) {
          // Distribute children across the spread range
          const t = numChildren === 1 ? 0 : (c / (numChildren - 1)) * 2 - 1; // -1 to +1
          const childAngle = cAngle + t * spreadRad + (rng() - 0.5) * spreadRad * 0.3;
          growBranch(cx, cy, childAngle, childLen, depth - 1, childThick, rng);
        }
      }
    }

    // =========================================================================
    // COLOR UTILITIES
    // =========================================================================
    // Gold palette: #c9a84c (base) → #fff3b0 (peak)
    // Components: base (201,168,76) → bright (255,243,176)
    const GOLD_BASE = [201, 168, 76];
    const GOLD_BRIGHT = [255, 243, 176];
    // Neural signal: amber (warm) and blue-white (cool)
    const SIG_WARM = [220, 170, 60];
    const SIG_WARM_BRIGHT = [255, 230, 140];
    const SIG_COOL = [60, 140, 220];
    const SIG_COOL_BRIGHT = [160, 220, 255];

    function colorForBrightness(b, dotSign) {
      if (colorMode === 'gold') {
        const r = GOLD_BASE[0] + (GOLD_BRIGHT[0] - GOLD_BASE[0]) * b;
        const g = GOLD_BASE[1] + (GOLD_BRIGHT[1] - GOLD_BASE[1]) * b;
        const bl = GOLD_BASE[2] + (GOLD_BRIGHT[2] - GOLD_BASE[2]) * b;
        return `rgba(${r|0},${g|0},${bl|0},${(0.15 + b * 0.85).toFixed(3)})`;
      } else {
        // Neural signal: warm for positive dot, cool for negative, mix in between
        const warmMix = (dotSign + 1) * 0.5; // 0 = cool, 1 = warm
        const base = [
          SIG_WARM[0] * warmMix + SIG_COOL[0] * (1 - warmMix),
          SIG_WARM[1] * warmMix + SIG_COOL[1] * (1 - warmMix),
          SIG_WARM[2] * warmMix + SIG_COOL[2] * (1 - warmMix)
        ];
        const bright = [
          SIG_WARM_BRIGHT[0] * warmMix + SIG_COOL_BRIGHT[0] * (1 - warmMix),
          SIG_WARM_BRIGHT[1] * warmMix + SIG_COOL_BRIGHT[1] * (1 - warmMix),
          SIG_WARM_BRIGHT[2] * warmMix + SIG_COOL_BRIGHT[2] * (1 - warmMix)
        ];
        const r = base[0] + (bright[0] - base[0]) * b;
        const g = base[1] + (bright[1] - base[1]) * b;
        const bl = base[2] + (bright[2] - base[2]) * b;
        return `rgba(${r|0},${g|0},${bl|0},${(0.15 + b * 0.85).toFixed(3)})`;
      }
    }

    // =========================================================================
    // p5.js — SETUP
    // =========================================================================
    let mainCanvas;

    function setup() {
      const container = document.getElementById('canvas-container');
      mainCanvas = createCanvas(windowWidth, windowHeight);
      mainCanvas.parent(container);
      pixelDensity(1);

      // Create bloom overlay canvas (raw HTML canvas, CSS-blurred)
      bloomCanvas = document.createElement('canvas');
      bloomCanvas.id = 'bloom-canvas';
      bloomCanvas.width = Math.floor(windowWidth / 2);
      bloomCanvas.height = Math.floor(windowHeight / 2);
      container.appendChild(bloomCanvas);
      bloomCtx = bloomCanvas.getContext('2d');

      document.getElementById('seed-input').value = currentSeed;
      generateNetwork(windowWidth, windowHeight);
    }

    // =========================================================================
    // p5.js — DRAW (hot loop — no geometry generation, only brightness + render)
    // =========================================================================
    // Pre-allocated array for dot-sign storage (for neural signal mode)
    let dotSigns = null;

    function draw() {
      const ctx = drawingContext; // raw canvas2d — no p5 overhead
      const n = segments.length;
      if (n === 0) return;

      // Lazy-init dotSigns array
      if (!dotSigns || dotSigns.length !== n) {
        dotSigns = new Float32Array(n);
      }

      // --- Advance light angle ---
      lightAngle += params.lightSpeed * (Math.PI / 180);
      if (lightAngle > Math.PI * 2) lightAngle -= Math.PI * 2;

      const lightDirX = Math.cos(lightAngle);
      const lightDirY = Math.sin(lightAngle);

      // --- Glow width: convert degrees to the sigma for our formula ---
      // brightness = exp(-(1 - |dot|)^2 / (2*sigma^2)) * |dot|
      // sigma is normalized: glowWidth in degrees / 90 gives a 0-1 scale
      const sigma = (params.glowWidth / 90);
      const invTwoSigmaSq = 1 / (2 * sigma * sigma);

      // --- Compute brightness per segment ---
      for (let i = 0; i < n; i++) {
        const seg = segments[i];
        const dot = seg.nx * lightDirX + seg.ny * lightDirY;
        const absDot = Math.abs(dot);
        dotSigns[i] = dot; // store signed dot for neural signal coloring

        // Anisotropic response: Gaussian around perfect alignment
        const deviation = 1 - absDot;
        const instantaneous = Math.exp(-deviation * deviation * invTwoSigmaSq) * absDot;

        // Temporal persistence: max of decayed previous and new excitation
        brightness[i] = Math.max(brightness[i] * params.decayRate, instantaneous);
      }

      // --- Clear main canvas ---
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);

      // --- Draw segments with additive blending ---
      ctx.globalCompositeOperation = 'screen';
      ctx.lineCap = 'round';

      for (let i = 0; i < n; i++) {
        const b = brightness[i];
        if (b < 0.008) continue; // skip invisible segments

        const seg = segments[i];
        ctx.strokeStyle = colorForBrightness(b, dotSigns[i]);
        ctx.lineWidth = seg.thick * (0.4 + b * 1.0);
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
      }

      // --- Draw soma nodes ---
      ctx.globalCompositeOperation = 'screen';
      for (const soma of somaList) {
        // Find max brightness among nearby segments
        let maxB = 0;
        const end = Math.min(soma.segEnd, soma.segStart + 30); // only check first few
        for (let i = soma.segStart; i < end; i++) {
          if (brightness[i] > maxB) maxB = brightness[i];
        }
        if (maxB < 0.02) continue;

        const alpha = maxB;
        if (colorMode === 'gold') {
          const r = GOLD_BASE[0] + (GOLD_BRIGHT[0] - GOLD_BASE[0]) * maxB;
          const g = GOLD_BASE[1] + (GOLD_BRIGHT[1] - GOLD_BASE[1]) * maxB;
          const bl = GOLD_BASE[2] + (GOLD_BRIGHT[2] - GOLD_BASE[2]) * maxB;
          ctx.fillStyle = `rgba(${r|0},${g|0},${bl|0},${alpha.toFixed(3)})`;
        } else {
          ctx.fillStyle = `rgba(200,200,220,${alpha.toFixed(3)})`;
        }
        ctx.beginPath();
        ctx.arc(soma.x, soma.y, 2.5 + maxB * 3, 0, Math.PI * 2);
        ctx.fill();

        // Glow halo for bright soma
        if (maxB > 0.35) {
          ctx.fillStyle = `rgba(255,243,176,${(maxB * 0.25).toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(soma.x, soma.y, 6 + maxB * 8, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // --- Bloom pass: draw bright segments to half-res CSS-blurred canvas ---
      if (params.bloomIntensity > 0.01) {
        const bw = bloomCanvas.width;
        const bh = bloomCanvas.height;
        const scaleX = bw / width;
        const scaleY = bh / height;

        bloomCtx.clearRect(0, 0, bw, bh);
        bloomCtx.globalCompositeOperation = 'screen';
        bloomCtx.lineCap = 'round';
        bloomCtx.globalAlpha = params.bloomIntensity * 0.45;

        for (let i = 0; i < n; i++) {
          const b = brightness[i];
          if (b < 0.12) continue;

          const seg = segments[i];

          if (colorMode === 'gold') {
            const r = GOLD_BRIGHT[0];
            const g = GOLD_BRIGHT[1];
            const bl = GOLD_BRIGHT[2];
            bloomCtx.strokeStyle = `rgba(${r},${g},${bl},${(b * 0.8).toFixed(3)})`;
          } else {
            bloomCtx.strokeStyle = colorForBrightness(b, dotSigns[i]);
          }
          bloomCtx.lineWidth = seg.thick * 3.5 * b * scaleX;
          bloomCtx.beginPath();
          bloomCtx.moveTo(seg.x1 * scaleX, seg.y1 * scaleY);
          bloomCtx.lineTo(seg.x2 * scaleX, seg.y2 * scaleY);
          bloomCtx.stroke();
        }

        bloomCtx.globalAlpha = 1.0;
      }

      // Reset composite mode
      ctx.globalCompositeOperation = 'source-over';
    }

    // =========================================================================
    // WINDOW RESIZE
    // =========================================================================
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      bloomCanvas.width = Math.floor(windowWidth / 2);
      bloomCanvas.height = Math.floor(windowHeight / 2);
      generateNetwork(windowWidth, windowHeight);
    }

    // =========================================================================
    // UI BINDINGS
    // =========================================================================
    function bindSlider(id, paramKey, valId, parse) {
      const el = document.getElementById(id);
      const valEl = document.getElementById(valId);
      el.addEventListener('input', () => {
        const v = parse ? parse(el.value) : parseFloat(el.value);
        params[paramKey] = v;
        valEl.textContent = el.value;
      });
    }

    function regenerate() {
      lightAngle = 0;
      generateNetwork(width || windowWidth, height || windowHeight);
    }

    window.addEventListener('DOMContentLoaded', () => {
      bindSlider('ctrl-neurons', 'neuronCount', 'val-neurons', v => parseInt(v));
      bindSlider('ctrl-depth', 'branchDepth', 'val-depth', v => parseInt(v));
      bindSlider('ctrl-spread', 'branchSpread', 'val-spread', v => parseInt(v));
      bindSlider('ctrl-density', 'lineDensity', 'val-density');
      bindSlider('ctrl-speed', 'lightSpeed', 'val-speed');
      bindSlider('ctrl-glow', 'glowWidth', 'val-glow', v => parseInt(v));
      bindSlider('ctrl-decay', 'decayRate', 'val-decay');
      bindSlider('ctrl-bloom', 'bloomIntensity', 'val-bloom');

      // Regenerate on structural param change (release, not every input tick)
      ['ctrl-neurons', 'ctrl-depth', 'ctrl-spread', 'ctrl-density'].forEach(id => {
        document.getElementById(id).addEventListener('change', regenerate);
      });

      // Seed controls
      document.getElementById('seed-random').addEventListener('click', () => {
        currentSeed = Math.floor(Math.random() * 999999);
        document.getElementById('seed-input').value = currentSeed;
        regenerate();
      });
      document.getElementById('seed-prev').addEventListener('click', () => {
        currentSeed = Math.max(0, currentSeed - 1);
        document.getElementById('seed-input').value = currentSeed;
        regenerate();
      });
      document.getElementById('seed-next').addEventListener('click', () => {
        currentSeed++;
        document.getElementById('seed-input').value = currentSeed;
        regenerate();
      });
      document.getElementById('seed-input').addEventListener('change', (e) => {
        currentSeed = parseInt(e.target.value) || 0;
        regenerate();
      });

      // Color mode
      document.getElementById('mode-gold').addEventListener('click', () => {
        colorMode = 'gold';
        document.getElementById('mode-gold').classList.add('active');
        document.getElementById('mode-signal').classList.remove('active');
      });
      document.getElementById('mode-signal').addEventListener('click', () => {
        colorMode = 'signal';
        document.getElementById('mode-signal').classList.add('active');
        document.getElementById('mode-gold').classList.remove('active');
      });

      // Action buttons
      document.getElementById('btn-regen').addEventListener('click', () => {
        currentSeed = Math.floor(Math.random() * 999999);
        document.getElementById('seed-input').value = currentSeed;
        regenerate();
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        params = { ...DEFAULTS };
        document.getElementById('ctrl-neurons').value = DEFAULTS.neuronCount;
        document.getElementById('ctrl-depth').value = DEFAULTS.branchDepth;
        document.getElementById('ctrl-spread').value = DEFAULTS.branchSpread;
        document.getElementById('ctrl-density').value = DEFAULTS.lineDensity;
        document.getElementById('ctrl-speed').value = DEFAULTS.lightSpeed;
        document.getElementById('ctrl-glow').value = DEFAULTS.glowWidth;
        document.getElementById('ctrl-decay').value = DEFAULTS.decayRate;
        document.getElementById('ctrl-bloom').value = DEFAULTS.bloomIntensity;
        document.getElementById('val-neurons').textContent = DEFAULTS.neuronCount;
        document.getElementById('val-depth').textContent = DEFAULTS.branchDepth;
        document.getElementById('val-spread').textContent = DEFAULTS.branchSpread;
        document.getElementById('val-density').textContent = DEFAULTS.lineDensity;
        document.getElementById('val-speed').textContent = DEFAULTS.lightSpeed;
        document.getElementById('val-glow').textContent = DEFAULTS.glowWidth;
        document.getElementById('val-decay').textContent = DEFAULTS.decayRate;
        document.getElementById('val-bloom').textContent = DEFAULTS.bloomIntensity;
        colorMode = 'gold';
        document.getElementById('mode-gold').classList.add('active');
        document.getElementById('mode-signal').classList.remove('active');
        regenerate();
      });

      document.getElementById('btn-download').addEventListener('click', () => {
        saveCanvas('neural-scintillation-' + currentSeed, 'png');
      });

      document.getElementById('sidebar-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('hidden');
      });
    });
  </script>
</body>
</html>
