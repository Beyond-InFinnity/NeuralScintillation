  <style>

<body>
  <div id="canvas-container"></div>

  <button id="sidebar-toggle" title="Toggle controls">☰</button>
  <div id="sidebar">
    <div class="sidebar-title">Neural Scintillation</div>
    <div class="sidebar-subtitle">Auric Dendriticism</div>

    <hr class="divider">

    <div class="control-label" style="margin-bottom: 6px;">Seed</div>
    <div class="seed-row">
      <input type="text" id="seed-input" class="seed-input" placeholder="Random seed">
      <button class="btn" id="seed-random" title="Random seed">⟳</button>
    </div>

    <div class="mode-toggle">
      <button id="mode-gold" class="active">Gold</button>
      <button id="mode-signal">Neural Signal</button>
    </div>

    <hr class="divider">

    <div class="control-group">
      <div class="control-label">Soma Count <span class="val" id="val-soma">12</span></div>
      <input type="range" id="ctrl-soma" min="4" max="30" value="12" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Branch Depth <span class="val" id="val-depth">5</span></div>
      <input type="range" id="ctrl-depth" min="2" max="8" value="5" step="1">
    </div>
    <div class="control-group">
      <div class="control-label">Branch Factor <span class="val" id="val-branch">0.65</span></div>
      <input type="range" id="ctrl-branch" min="0.2" max="1.0" value="0.65" step="0.05">
    </div>
    <div class="control-group">
      <div class="control-label">Segment Length <span class="val" id="val-seglen">28</span></div>
      <input type="range" id="ctrl-seglen" min="10" max="60" value="28" step="2">
    </div>
    <div class="control-group">
      <div class="control-label">Noise Scale <span class="val" id="val-noise">0.008</span></div>
      <input type="range" id="ctrl-noise" min="0.002" max="0.025" value="0.008" step="0.001">
    </div>
    <div class="control-group">
      <div class="control-label">Light Speed <span class="val" id="val-speed">1.20</span></div>
      <input type="range" id="ctrl-speed" min="0.2" max="3.0" value="1.2" step="0.1">
    </div>
    <div class="control-group">
      <div class="control-label">Decay Rate <span class="val" id="val-decay">0.92</span></div>
      <input type="range" id="ctrl-decay" min="0.80" max="0.98" value="0.92" step="0.01">
    </div>
    <div class="control-group">
      <div class="control-label">Bloom Intensity <span class="val" id="val-bloom">0.45</span></div>
      <input type="range" id="ctrl-bloom" min="0.0" max="1.0" value="0.45" step="0.05">
    </div>

    <hr class="divider">

    <div class="btn-row">
      <button class="btn" id="btn-regen">Regenerate</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-download">Download Frame</button>
    </div>
  </div>

  <script>
    // --- Embed mode detection ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('embed') === 'true') {
      document.body.classList.add('embed-mode');
    }

    // --- Parameters ---
    let params = {
      somaCount: 12,
      branchDepth: 5,
      branchFactor: 0.65,
      segmentLength: 28,
      noiseScale: 0.008,
      lightSpeed: 1.2,
      decayRate: 0.92,
      bloomIntensity: 0.45
    };

    let colorMode = 'gold';
    let currentSeed = Math.floor(Math.random() * 999999);
    let segments = [];
    let lightPhase = 0;
    let bloomBuffer;
    let mainCanvas;

    // --- Color palettes ---
    const palettes = {
      gold: {
        base: [212, 160, 23],
        bright: [255, 215, 60],
        dim: [140, 100, 10],
        soma: [255, 200, 40]
      },
      signal: {
        base: [40, 180, 220],
        bright: [100, 240, 255],
        dim: [15, 80, 120],
        soma: [60, 220, 255]
      }
    };

    // --- Poisson Disk Sampling ---
    function poissonDiskSample(width, height, minDist, count, rng) {
      const points = [];
      const cellSize = minDist / Math.SQRT2;
      const gridW = Math.ceil(width / cellSize);
      const gridH = Math.ceil(height / cellSize);
      const grid = new Array(gridW * gridH).fill(-1);
      const active = [];

      function gridIdx(x, y) {
        return Math.floor(x / cellSize) + Math.floor(y / cellSize) * gridW;
      }

      const margin = minDist * 0.5;
      const x0 = margin + rng() * (width - 2 * margin);
      const y0 = margin + rng() * (height - 2 * margin);
      points.push({ x: x0, y: y0 });
      active.push(0);
      grid[gridIdx(x0, y0)] = 0;

      while (active.length > 0 && points.length < count) {
        const ai = Math.floor(rng() * active.length);
        const pi = active[ai];
        const p = points[pi];
        let found = false;

        for (let attempt = 0; attempt < 30; attempt++) {
          const angle = rng() * Math.PI * 2;
          const dist = minDist + rng() * minDist;
          const nx = p.x + Math.cos(angle) * dist;
          const ny = p.y + Math.sin(angle) * dist;

          if (nx < margin || nx >= width - margin || ny < margin || ny >= height - margin) continue;

          const gi = gridIdx(nx, ny);
          const gx = Math.floor(nx / cellSize);
          const gy = Math.floor(ny / cellSize);
          let ok = true;

          for (let dy = -2; dy <= 2 && ok; dy++) {
            for (let dx = -2; dx <= 2 && ok; dx++) {
              const cx = gx + dx;
              const cy = gy + dy;
              if (cx < 0 || cx >= gridW || cy < 0 || cy >= gridH) continue;
              const ci = cx + cy * gridW;
              if (grid[ci] !== -1) {
                const other = points[grid[ci]];
                const ddx = nx - other.x;
                const ddy = ny - other.y;
                if (ddx * ddx + ddy * ddy < minDist * minDist) ok = false;
              }
            }
          }

          if (ok) {
            points.push({ x: nx, y: ny });
            const ni = points.length - 1;
            active.push(ni);
            grid[gi] = ni;
            found = true;
            break;
          }
        }

        if (!found) active.splice(ai, 1);
      }

      return points.slice(0, count);
    }

    // --- Seeded RNG (mulberry32) ---
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    // --- Generate neural geometry ---
    function generateNetwork() {
      segments = [];
      const rng = mulberry32(currentSeed);
      const cw = mainCanvas ? mainCanvas.width : windowWidth;
      const ch = mainCanvas ? mainCanvas.height : windowHeight;

      const minDist = Math.min(cw, ch) / (Math.sqrt(params.somaCount) * 1.2);
      const somas = poissonDiskSample(cw, ch, minDist, params.somaCount, rng);

      for (const soma of somas) {
        const numPrimary = 3 + Math.floor(rng() * 4);
        for (let i = 0; i < numPrimary; i++) {
          const angle = (i / numPrimary) * Math.PI * 2 + (rng() - 0.5) * 0.8;
          growBranch(soma.x, soma.y, angle, params.segmentLength, params.branchDepth, 2.5, rng);
        }
      }

      // Assign cumulative distances for light propagation
      // Each segment gets a distance from its tree root
      let treeStart = 0;
      let totalDist = 0;
      for (const seg of segments) {
        seg.distFromRoot = totalDist;
        totalDist += seg.len;
        if (seg.isTerminal) {
          totalDist += params.segmentLength * 2; // gap between trees
        }
      }

      return somas;
    }

    function growBranch(x, y, angle, length, depth, thickness, rng) {
      if (depth <= 0 || thickness < 0.3) return;

      const steps = Math.max(2, Math.round(length / 6));
      let cx = x, cy = y;
      let cAngle = angle;

      for (let i = 0; i < steps; i++) {
        const stepLen = length / steps;
        const noiseVal = noise(cx * params.noiseScale, cy * params.noiseScale, currentSeed * 0.01);
        cAngle += (noiseVal - 0.5) * 1.2;

        const nx = cx + Math.cos(cAngle) * stepLen;
        const ny = cy + Math.sin(cAngle) * stepLen;

        // Compute segment normal (perpendicular to direction)
        const dx = nx - cx;
        const dy = ny - cy;
        const len = Math.sqrt(dx * dx + dy * dy);
        const normalX = -dy / (len || 1);
        const normalY = dx / (len || 1);

        segments.push({
          x1: cx, y1: cy, x2: nx, y2: ny,
          normalX, normalY,
          thickness: thickness * (1 - i / (steps * 2)),
          len: stepLen,
          depth,
          brightness: 0,
          isTerminal: false
        });

        cx = nx;
        cy = ny;
      }

      // Mark last segment as terminal if no children will branch
      const willBranch = rng() < params.branchFactor && depth > 1;
      const willBranch2 = rng() < params.branchFactor * 0.6 && depth > 1;

      if (!willBranch && !willBranch2 && segments.length > 0) {
        segments[segments.length - 1].isTerminal = true;
      }

      if (willBranch) {
        const spread = 0.3 + rng() * 0.5;
        growBranch(cx, cy, cAngle - spread, length * 0.72, depth - 1, thickness * 0.7, rng);
      }
      if (willBranch2) {
        const spread = 0.3 + rng() * 0.5;
        growBranch(cx, cy, cAngle + spread, length * 0.72, depth - 1, thickness * 0.7, rng);
      }
    }

    // --- p5.js Sketch ---
    let somas = [];

    function setup() {
      const isEmbed = document.body.classList.contains('embed-mode');
      const container = document.getElementById('canvas-container');
      mainCanvas = createCanvas(windowWidth, windowHeight);
      mainCanvas.parent(container);

      bloomBuffer = createGraphics(Math.floor(width / 2), Math.floor(height / 2));
      bloomBuffer.pixelDensity(1);

      document.getElementById('seed-input').value = currentSeed;
      somas = generateNetwork();
    }

    function draw() {
      const pal = palettes[colorMode];

      // --- Advance light phase ---
      lightPhase += params.lightSpeed * 0.02;

      // --- Rotating light direction ---
      const lightAngle = lightPhase * 0.7;
      const lightDirX = Math.cos(lightAngle);
      const lightDirY = Math.sin(lightAngle);

      // --- Update segment brightness with anisotropic response ---
      let cumDist = 0;
      for (const seg of segments) {
        // Anisotropic: dot product of light direction and segment normal
        const dot = Math.abs(seg.normalX * lightDirX + seg.normalY * lightDirY);

        // Traveling wave: Gaussian kernel centered on light wavefront
        const waveFront = (lightPhase * 200) % (cumDist + 5000);
        const distToWave = cumDist - waveFront;
        const sigma = 80;
        const waveResponse = Math.exp(-distToWave * distToWave / (2 * sigma * sigma));

        // Combine anisotropic and wave response
        const excitation = dot * waveResponse * 2.5;

        // Temporal persistence with exponential decay
        seg.brightness = Math.max(seg.brightness * params.decayRate, excitation);
        seg.brightness = Math.min(seg.brightness, 1.0);

        cumDist += seg.len;
        if (seg.isTerminal) cumDist += params.segmentLength * 2;
      }

      // --- Draw to main canvas ---
      background(10, 10, 10);

      // Draw segments
      for (const seg of segments) {
        if (seg.brightness < 0.005) continue;

        const b = seg.brightness;
        const r = lerp(pal.dim[0], pal.bright[0], b);
        const g = lerp(pal.dim[1], pal.bright[1], b);
        const bl = lerp(pal.dim[2], pal.bright[2], b);

        stroke(r, g, bl, 40 + b * 215);
        strokeWeight(seg.thickness * (0.6 + b * 0.8));
        line(seg.x1, seg.y1, seg.x2, seg.y2);

        // Bright glow core
        if (b > 0.3) {
          stroke(pal.bright[0], pal.bright[1], pal.bright[2], b * 120);
          strokeWeight(seg.thickness * 0.3 * b);
          line(seg.x1, seg.y1, seg.x2, seg.y2);
        }
      }

      // Draw soma nodes
      noStroke();
      for (const soma of somas) {
        // Find max brightness near this soma
        let maxB = 0;
        for (const seg of segments) {
          const dx = seg.x1 - soma.x;
          const dy = seg.y1 - soma.y;
          if (dx * dx + dy * dy < 400) {
            maxB = Math.max(maxB, seg.brightness);
          }
        }
        const alpha = 30 + maxB * 200;
        fill(pal.soma[0], pal.soma[1], pal.soma[2], alpha);
        circle(soma.x, soma.y, 5 + maxB * 4);

        if (maxB > 0.4) {
          fill(pal.soma[0], pal.soma[1], pal.soma[2], maxB * 60);
          circle(soma.x, soma.y, 12 + maxB * 10);
        }
      }

      // --- Bloom pass (half resolution) ---
      if (params.bloomIntensity > 0.01) {
        bloomBuffer.clear();
        bloomBuffer.background(0, 0);
        bloomBuffer.scale(0.5);

        for (const seg of segments) {
          if (seg.brightness < 0.15) continue;
          const b = seg.brightness;
          bloomBuffer.stroke(
            pal.bright[0], pal.bright[1], pal.bright[2],
            b * 80 * params.bloomIntensity
          );
          bloomBuffer.strokeWeight(seg.thickness * 3 * b);
          bloomBuffer.line(seg.x1, seg.y1, seg.x2, seg.y2);
        }

        bloomBuffer.scale(2);
        bloomBuffer.filter(BLUR, 4);

        // Additive composite
        push();
        blendMode(ADD);
        image(bloomBuffer, 0, 0, width, height);
        blendMode(BLEND);
        pop();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      bloomBuffer = createGraphics(Math.floor(width / 2), Math.floor(height / 2));
      bloomBuffer.pixelDensity(1);
      somas = generateNetwork();
    }

    // --- UI Bindings ---
    function bindSlider(id, paramKey, valId, parse) {
      const el = document.getElementById(id);
      const valEl = document.getElementById(valId);
      el.addEventListener('input', () => {
        const v = parse ? parse(el.value) : parseFloat(el.value);
        params[paramKey] = v;
        valEl.textContent = el.value;
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      bindSlider('ctrl-soma', 'somaCount', 'val-soma', v => parseInt(v));
      bindSlider('ctrl-depth', 'branchDepth', 'val-depth', v => parseInt(v));
      bindSlider('ctrl-branch', 'branchFactor', 'val-branch');
      bindSlider('ctrl-seglen', 'segmentLength', 'val-seglen', v => parseInt(v));
      bindSlider('ctrl-noise', 'noiseScale', 'val-noise');
      bindSlider('ctrl-speed', 'lightSpeed', 'val-speed');
      bindSlider('ctrl-decay', 'decayRate', 'val-decay');
      bindSlider('ctrl-bloom', 'bloomIntensity', 'val-bloom');

      // Regenerate on structural param change
      ['ctrl-soma', 'ctrl-depth', 'ctrl-branch', 'ctrl-seglen', 'ctrl-noise'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          somas = generateNetwork();
        });
      });

      // Seed
      document.getElementById('seed-random').addEventListener('click', () => {
        currentSeed = Math.floor(Math.random() * 999999);
        document.getElementById('seed-input').value = currentSeed;
        somas = generateNetwork();
      });
      document.getElementById('seed-input').addEventListener('change', (e) => {
        currentSeed = parseInt(e.target.value) || 0;
        somas = generateNetwork();
      });

      // Color mode toggle
      document.getElementById('mode-gold').addEventListener('click', () => {
        colorMode = 'gold';
        document.getElementById('mode-gold').classList.add('active');
        document.getElementById('mode-signal').classList.remove('active');
      });
      document.getElementById('mode-signal').addEventListener('click', () => {
        colorMode = 'signal';
        document.getElementById('mode-signal').classList.add('active');
        document.getElementById('mode-gold').classList.remove('active');
      });

      // Buttons
      document.getElementById('btn-regen').addEventListener('click', () => {
        currentSeed = Math.floor(Math.random() * 999999);
        document.getElementById('seed-input').value = currentSeed;
        somas = generateNetwork();
      });
      document.getElementById('btn-reset').addEventListener('click', () => {
        // Reset all params to defaults
        params = {
          somaCount: 12, branchDepth: 5, branchFactor: 0.65,
          segmentLength: 28, noiseScale: 0.008, lightSpeed: 1.2,
          decayRate: 0.92, bloomIntensity: 0.45
        };
        document.getElementById('ctrl-soma').value = 12;
        document.getElementById('ctrl-depth').value = 5;
        document.getElementById('ctrl-branch').value = 0.65;
        document.getElementById('ctrl-seglen').value = 28;
        document.getElementById('ctrl-noise').value = 0.008;
        document.getElementById('ctrl-speed').value = 1.2;
        document.getElementById('ctrl-decay').value = 0.92;
        document.getElementById('ctrl-bloom').value = 0.45;
        document.getElementById('val-soma').textContent = '12';
        document.getElementById('val-depth').textContent = '5';
        document.getElementById('val-branch').textContent = '0.65';
        document.getElementById('val-seglen').textContent = '28';
        document.getElementById('val-noise').textContent = '0.008';
        document.getElementById('val-speed').textContent = '1.20';
        document.getElementById('val-decay').textContent = '0.92';
        document.getElementById('val-bloom').textContent = '0.45';
        colorMode = 'gold';
        document.getElementById('mode-gold').classList.add('active');
        document.getElementById('mode-signal').classList.remove('active');
        somas = generateNetwork();
      });
      document.getElementById('btn-download').addEventListener('click', () => {
        saveCanvas('neural-scintillation-' + currentSeed, 'png');
      });

      // Sidebar toggle
      document.getElementById('sidebar-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('hidden');
      });
    });
  </script>
