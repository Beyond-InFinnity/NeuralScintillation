<body>

  <div id="sidebar">
    <div class="st">Neural Scintillation</div><div class="ss">Auric Dendriticism</div>

    <div class="sr"><input type="text" id="seed" class="si"><button class="b" id="sp">&#8592;</button><button class="b" id="sn">&#8594;</button><button class="b" id="sr2">&#x27F3;</button></div>
    <div class="cg"><div class="cl">Color Mode</div><select id="cm" class="cs"><option value="0" selected>Gold</option><option value="1">Silver / Ink</option><option value="2">Golgi Stain</option><option value="3">Brainbow Classic</option><option value="4">Brainbow Warm</option><option value="5">Brainbow Cool</option><option value="6">Brainbow Spectrum</option></select></div>
    <hr class="dv">
    <div class="cg"><div class="cl">Neuron Count <span class="v" id="vn">28</span></div><input type="range" id="cn" min="5" max="50" value="28" step="1"></div>
    <div class="cg"><div class="cl">Branch Depth <span class="v" id="vd">4</span></div><input type="range" id="cd" min="2" max="6" value="4" step="1"></div>
    <div class="cg"><div class="cl">Branch Spread <span class="v" id="vs">22</span>&deg;</div><input type="range" id="css" min="5" max="45" value="22" step="1"></div>
    <div class="cg"><div class="cl">Line Density <span class="v" id="vl">1.2</span></div><input type="range" id="cl2" min="0.5" max="3.0" value="1.2" step="0.1"></div>
    <div class="cg"><div class="cl">Light Speed <span class="v" id="vsp">0.8</span>&deg;/f</div><input type="range" id="csp" min="0.1" max="3.0" value="0.8" step="0.1"></div>

    <div class="cg"><div class="cl">Bloom Intensity <span class="v" id="vb">0.40</span></div><input type="range" id="cb" min="0.0" max="1.0" value="0.40" step="0.05"></div>
    <hr class="dv">

    <div class="br"><button class="b" id="dl">Download PNG</button></div>
    <div class="sc" id="sc"></div>
  </div>

<script>
"use strict";
if(new URLSearchParams(location.search).get('embed')==='true')document.body.classList.add('embed-mode');

// ======================== PARAMS ========================
const D={neuronCount:28,branchDepth:4,branchSpread:22,lineDensity:1.2,lightSpeed:0.8,glowWidth:25,decayRate:0.88,bloomIntensity:0.40};
let P={...D},colorMode=0,seed=Math.random()*999999|0;

// ======================== PERLIN NOISE ========================
let _pp;
function initNoise(s){const r=mb32(s);_pp=new Uint8Array(512);const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=r()*(i+1)|0,t=p[i];p[i]=p[j];p[j]=t;}for(let i=0;i<512;i++)_pp[i]=p[i&255];}
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function grad(h,x,y,z){const b=h&15,u=b<8?x:y,v=b<4?y:b===12||b===14?x:z;return((b&1)?-u:u)+((b&2)?-v:v);}
function noi(x,y,z){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
  x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
  const u=fade(x),v=fade(y),w=fade(z),p=_pp;
  const A=p[X]+Y,AA=p[A]+Z,AB=p[A+1]+Z,B=p[X+1]+Y,BA=p[B]+Z,BB=p[B+1]+Z;
  function lr(t,a,b){return a+t*(b-a);}
  return(lr(w,lr(v,lr(u,grad(p[AA],x,y,z),grad(p[BA],x-1,y,z)),lr(u,grad(p[AB],x,y-1,z),grad(p[BB],x-1,y-1,z))),
    lr(v,lr(u,grad(p[AA+1],x,y,z-1),grad(p[BA+1],x-1,y,z-1)),lr(u,grad(p[AB+1],x,y-1,z-1),grad(p[BB+1],x-1,y-1,z-1))))+1)*0.5;
}

// ======================== RNG ========================
function mb32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ======================== FLAT TYPED ARRAYS ========================
const MX=150000;
const SX1=new Float32Array(MX),SY1=new Float32Array(MX),SX2=new Float32Array(MX),SY2=new Float32Array(MX);
const SNX=new Float32Array(MX),SNY=new Float32Array(MX),SW=new Float32Array(MX);
const SNI=new Float32Array(MX); // float for GPU attribute
const SBR=new Float32Array(MX);
let segN=0,somaList=[],lightAngle=0;

// Gaussian LUT
const GAUSS=new Float32Array(256);let _gs=-1;
function rebuildG(){const s=P.glowWidth/90;if(s===_gs)return;_gs=s;const inv=1/(2*s*s);for(let i=0;i<256;i++){const d=i/255;GAUSS[i]=Math.exp(-d*d*inv)*(1-d);}}

// ======================== COLORS ========================
const BB_PAL=[
  [[220,50,220],[50,200,220],[80,220,80],[220,180,40],[60,80,220],[240,140,40],[180,40,180],[40,220,140],[220,100,100],[100,160,220]],
  [[220,170,40],[230,120,40],[200,50,50],[220,50,140],[240,130,170],[180,140,40],[200,80,40],[240,180,100]],
  [[40,180,180],[60,100,220],[60,200,100],[80,220,220],[180,180,220],[100,180,140],[40,140,200],[150,220,180]],
];
let neuronColors=[];
function hsl(h,s,l){h/=360;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h*12)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};return[f(0)*255|0,f(8)*255|0,f(4)*255|0];}
function assignColors(n,rng){
  neuronColors=[];
  if(colorMode>=3){
    let pal=colorMode===6?null:BB_PAL[colorMode-3];
    for(let i=0;i<n;i++){
      const c=colorMode===6?hsl((i/n)*360+rng()*25,0.8+rng()*0.15,0.5+rng()*0.15):pal[i%pal.length];
      neuronColors.push({b:c,r:[Math.min(255,c[0]+70),Math.min(255,c[1]+70),Math.min(255,c[2]+70)]});
    }
  }
}

// ======================== POISSON DISK ========================
function poisson(w,h,md,cnt,rng){
  const pts=[],cs=md/1.4142,gw=Math.ceil(w/cs),gh=Math.ceil(h/cs);
  const g=new Int32Array(gw*gh).fill(-1),act=[],m=md*0.25;
  let x0=m+rng()*(w-2*m),y0=m+rng()*(h-2*m);
  pts.push({x:x0,y:y0});act.push(0);g[(x0/cs|0)+(y0/cs|0)*gw]=0;
  while(act.length>0&&pts.length<cnt*4){
    const ai=rng()*act.length|0,p=pts[act[ai]];let f=false;
    for(let a=0;a<30;a++){const an=rng()*6.2832,d=md+rng()*md,nx=p.x+Math.cos(an)*d,ny=p.y+Math.sin(an)*d;
      if(nx<m||nx>=w-m||ny<m||ny>=h-m)continue;const gx=nx/cs|0,gy=ny/cs|0;let ok=true;
      o:for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const cx=gx+dx,cy=gy+dy;if(cx<0||cx>=gw||cy<0||cy>=gh)continue;
        const ci=g[cx+cy*gw];if(ci!==-1){const ddx=nx-pts[ci].x,ddy=ny-pts[ci].y;if(ddx*ddx+ddy*ddy<md*md){ok=false;break o;}}}
      if(ok){const ni=pts.length;pts.push({x:nx,y:ny});act.push(ni);g[gx+gy*gw]=ni;f=true;break;}}
    if(!f)act.splice(ai,1);}
  return pts.slice(0,cnt);
}

// ======================== GEOMETRY ========================
function addS(x1,y1,x2,y2,w,ni){if(segN>=MX)return;const dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy)||1;SX1[segN]=x1;SY1[segN]=y1;SX2[segN]=x2;SY2[segN]=y2;SNX[segN]=-dy/l;SNY[segN]=dx/l;SW[segN]=w;SNI[segN]=ni;segN++;}

function generate(cw,ch){
  segN=0;somaList=[];SBR.fill(0);
  const rng=mb32(seed);initNoise(seed);const nz=(seed%1000)*0.1;
  const md=Math.min(cw,ch)/(Math.sqrt(P.neuronCount)*0.85);
  const somas=poisson(cw,ch,md,P.neuronCount,rng);
  assignColors(somas.length,mb32(seed+7));
  const mxD=P.branchDepth,sc=Math.min(cw,ch)/1000;
  for(let si=0;si<somas.length;si++){
    if(segN>=MX)break;const s=somas[si],st=segN,aD=rng()*6.2832;
    growD(s.x,s.y,aD,(100+rng()*80)*sc,3.0,0.3,mxD,0.18,rng,nz,si,s.x,s.y);
    const nB=4+(rng()*4|0);
    for(let i=0;i<nB;i++)growD(s.x,s.y,aD+3.1416+(rng()-0.5)*2.83,(35+rng()*45)*sc,2+rng()*0.5,0.2,Math.max(1,mxD-1),0.15,rng,nz,si,s.x,s.y);
    growD(s.x,s.y,aD+3.1416+(rng()-0.5)*0.5,(180+rng()*220)*sc,1.2,0.3,1,0.03,rng,nz,si,s.x,s.y);
    somaList.push({x:s.x,y:s.y,st,en:segN});
  }
  addSpines(rng);
  console.log(`[Gen] seed=${seed}, neurons=${somas.length}, segments=${segN}`);
  document.getElementById('sc').textContent=segN.toLocaleString()+' segments';
}

function growD(x,y,a,len,sw,ew,dep,sp,rng,nz,ni,sx,sy){
  if(segN>=MX||dep<0||len<2||sw<0.1)return;
  const ns=Math.max(3,len*P.lineDensity/5+0.5|0),step=len/ns,nzo=nz+ni*7.7;
  let cx=x,cy=y,ca=a;
  for(let i=0;i<ns;i++){
    if(segN>=MX)break;const t=i/ns,w=sw+(ew-sw)*t;
    ca+=(noi(cx*0.003,cy*0.003,nzo)-0.5)*0.3;
    const dx0=cx-sx,dy0=cy-sy,d0=Math.sqrt(dx0*dx0+dy0*dy0);
    if(d0>15){let df=Math.atan2(dy0,dx0)-ca;if(df>3.1416)df-=6.2832;if(df<-3.1416)df+=6.2832;ca+=df*0.05;}
    const nx=cx+Math.cos(ca)*step,ny=cy+Math.sin(ca)*step;
    addS(cx,cy,nx,ny,w,ni);cx=nx;cy=ny;
    if(dep>0&&i>1&&i<ns-1&&rng()<sp){const si=rng()>0.5?1:-1;growD(cx,cy,ca+si*(0.7+rng()*0.6),(len-i*step)*(0.3+rng()*0.25),w*0.55,Math.max(0.15,ew*0.4),Math.max(0,dep-1),sp*0.4,rng,nz,ni,sx,sy);}
  }
  if(dep>0&&segN<MX){const tm=dep<=2,nc=tm?3+(rng()*3|0):2+(rng()<0.45?1:0),spr=(tm?15:P.branchSpread)*0.01745;
    for(let c=0;c<nc;c++){const cl=tm?8+rng()*14:len*(0.5+rng()*0.22);growD(cx,cy,ca+(rng()-0.5)*2*spr,cl,ew,Math.max(0.15,ew*(tm?0.5:0.35)),dep-1,sp*0.5,rng,nz,ni,sx,sy);}}
}

function addSpines(rng){const n=segN;for(let i=0;i<n;i++){if(segN>=MX)break;if(SW[i]>0.6||rng()>0.25)continue;const si=rng()>0.5?1:-1,sl=1.5+rng()*3,mx=(SX1[i]+SX2[i])*0.5,my=(SY1[i]+SY2[i])*0.5;addS(mx,my,mx+SNX[i]*si*sl,my+SNY[i]*si*sl,0.15+rng()*0.1,SNI[i]);}}

// ======================== WEBGL ========================
let gl,ext,prog,vao,staticBuf,brightBuf,quadVBO,idxBuf,neuronTex;
let uRes,uLightDir,uMode,uBaseCol,uBrightCol,uNeuronTex;
const bloomEl=document.getElementById('bloom'),bloomCtx2=bloomEl.getContext('2d');

const VS=`#version 300 es
in vec2 a_corner;
in vec2 a_p1,a_p2,a_normal;
in float a_width,a_nIdx,a_br;
uniform vec2 u_res;
out float v_br,v_ni;
void main(){
  float b=a_br;
  if(b<0.01){gl_Position=vec4(2,2,0,1);v_br=0.0;v_ni=0.0;return;}
  float along=a_corner.x,across=a_corner.y*2.0-1.0;
  float hw=max(a_width*0.5*(0.3+b*0.7),0.35);
  vec2 pos=mix(a_p1,a_p2,along)+a_normal*across*hw;
  vec2 c=pos/u_res*2.0-1.0;c.y=-c.y;
  gl_Position=vec4(c,0,1);v_br=b;v_ni=a_nIdx;
}`;

const FS=`#version 300 es
precision mediump float;
in float v_br,v_ni;
uniform float u_mode;
uniform vec3 u_baseCol,u_brightCol;
uniform sampler2D u_neuronTex;
out vec4 fc;
void main(){
  if(v_br<0.005)discard;
  vec3 col;float alpha;
  if(u_mode<2.5){
    col=mix(u_baseCol,u_brightCol,v_br);
    alpha=u_mode>1.5?0.08+v_br*0.72:0.12+v_br*0.88;
  }else{
    float tc=(v_ni+0.5)/64.0;
    vec3 base=texture(u_neuronTex,vec2(tc,0.25)).rgb;
    vec3 bright=texture(u_neuronTex,vec2(tc,0.75)).rgb;
    col=mix(base,bright,v_br);alpha=0.12+v_br*0.88;
  }
  fc=vec4(col,alpha);
}`;

function compileShader(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}return s;}

function initGL(){
  const cv=document.getElementById('cv');
  cv.width=innerWidth;cv.height=innerHeight;
  gl=cv.getContext('webgl2',{alpha:false,premultipliedAlpha:false,antialias:true,preserveDrawingBuffer:true});
  if(!gl){document.body.innerHTML='<p style="color:#c9a84c;padding:40px">WebGL 2 required</p>';return false;}

  const vs=compileShader(VS,gl.VERTEX_SHADER),fs=compileShader(FS,gl.FRAGMENT_SHADER);
  prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(prog));return false;}
  gl.useProgram(prog);

  // Locations
  const loc=n=>gl.getAttribLocation(prog,n),uni=n=>gl.getUniformLocation(prog,n);
  const aCorner=loc('a_corner'),aP1=loc('a_p1'),aP2=loc('a_p2'),aNorm=loc('a_normal'),aW=loc('a_width'),aNI=loc('a_nIdx'),aBr=loc('a_br');
  uRes=uni('u_res');uMode=uni('u_mode');uBaseCol=uni('u_baseCol');uBrightCol=uni('u_brightCol');uNeuronTex=uni('u_neuronTex');

  // Unit quad: 4 verts, 6 indices
  quadVBO=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,quadVBO);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([0,0,1,0,1,1,0,1]),gl.STATIC_DRAW);
  idxBuf=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array([0,1,2,0,2,3]),gl.STATIC_DRAW);

  // Instance buffers
  staticBuf=gl.createBuffer();
  brightBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,brightBuf);
  gl.bufferData(gl.ARRAY_BUFFER,MX*4,gl.DYNAMIC_DRAW);

  // Neuron color texture
  neuronTex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,neuronTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,64,2,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array(64*2*4));
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

  // VAO
  vao=gl.createVertexArray();gl.bindVertexArray(vao);
  // Per-vertex
  gl.bindBuffer(gl.ARRAY_BUFFER,quadVBO);
  gl.enableVertexAttribArray(aCorner);gl.vertexAttribPointer(aCorner,2,gl.FLOAT,false,0,0);
  // Per-instance static (stride=32: 2+2+2+1+1 floats = 8 floats = 32 bytes)
  gl.bindBuffer(gl.ARRAY_BUFFER,staticBuf);
  gl.enableVertexAttribArray(aP1);gl.vertexAttribPointer(aP1,2,gl.FLOAT,false,32,0);gl.vertexAttribDivisor(aP1,1);
  gl.enableVertexAttribArray(aP2);gl.vertexAttribPointer(aP2,2,gl.FLOAT,false,32,8);gl.vertexAttribDivisor(aP2,1);
  gl.enableVertexAttribArray(aNorm);gl.vertexAttribPointer(aNorm,2,gl.FLOAT,false,32,16);gl.vertexAttribDivisor(aNorm,1);
  gl.enableVertexAttribArray(aW);gl.vertexAttribPointer(aW,1,gl.FLOAT,false,32,24);gl.vertexAttribDivisor(aW,1);
  gl.enableVertexAttribArray(aNI);gl.vertexAttribPointer(aNI,1,gl.FLOAT,false,32,28);gl.vertexAttribDivisor(aNI,1);
  // Per-instance dynamic brightness
  gl.bindBuffer(gl.ARRAY_BUFFER,brightBuf);
  gl.enableVertexAttribArray(aBr);gl.vertexAttribPointer(aBr,1,gl.FLOAT,false,0,0);gl.vertexAttribDivisor(aBr,1);
  // Index buffer
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
  gl.bindVertexArray(null);
  return true;
}

function uploadStatic(){
  const d=new Float32Array(segN*8);
  for(let i=0;i<segN;i++){const o=i*8;d[o]=SX1[i];d[o+1]=SY1[i];d[o+2]=SX2[i];d[o+3]=SY2[i];d[o+4]=SNX[i];d[o+5]=SNY[i];d[o+6]=SW[i];d[o+7]=SNI[i];}
  gl.bindBuffer(gl.ARRAY_BUFFER,staticBuf);gl.bufferData(gl.ARRAY_BUFFER,d,gl.STATIC_DRAW);
}

function uploadNeuronTex(){
  const d=new Uint8Array(64*2*4);
  for(let i=0;i<neuronColors.length&&i<64;i++){
    const nc=neuronColors[i],o=i*4,o2=256+i*4;
    d[o]=nc.b[0];d[o+1]=nc.b[1];d[o+2]=nc.b[2];d[o+3]=255;
    d[o2]=nc.r[0];d[o2+1]=nc.r[1];d[o2+2]=nc.r[2];d[o2+3]=255;
  }
  gl.bindTexture(gl.TEXTURE_2D,neuronTex);
  gl.texSubImage2D(gl.TEXTURE_2D,0,0,0,64,2,gl.RGBA,gl.UNSIGNED_BYTE,d);
}

function setColorUniforms(){
  const bases=[[0.788,0.659,0.298],[0.431,0.431,0.471],[0.227,0.165,0.102]];
  const brights=[[1,0.953,0.690],[0.878,0.878,0.922],[0.541,0.478,0.353]];
  const m=Math.min(colorMode,2);
  gl.uniform3fv(uBaseCol,bases[m]);gl.uniform3fv(uBrightCol,brights[m]);
  gl.uniform1f(uMode,colorMode);
  if(colorMode>=3)uploadNeuronTex();
}

// ======================== RENDER LOOP ========================
let fc=0,lastT=0,fpsC=0;

function frame(t){
  requestAnimationFrame(frame);
  fc++;fpsC++;
  if(t-lastT>1000){console.log(`[Perf] fps=${(fpsC*1000/(t-lastT)).toFixed(1)}, segs=${segN}`);fpsC=0;lastT=t;}
  if(!gl||segN===0)return;

  // Brightness on CPU
  rebuildG();
  lightAngle+=P.lightSpeed*0.01745;if(lightAngle>6.2832)lightAngle-=6.2832;
  const lx=Math.cos(lightAngle),ly=Math.sin(lightAngle),decay=P.decayRate;
  for(let i=0;i<segN;i++){
    const dot=SNX[i]*lx+SNY[i]*ly,ad=dot<0?-dot:dot;
    const di=((1-ad)*255+0.5)|0;
    const inst=GAUSS[di>255?255:di<0?0:di];
    const prev=SBR[i]*decay;
    SBR[i]=inst>prev?inst:prev;
  }

  // Upload brightness
  gl.bindBuffer(gl.ARRAY_BUFFER,brightBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,SBR.subarray(0,segN));

  // Render
  const isGolgi=colorMode===2;
  gl.viewport(0,0,gl.canvas.width,gl.canvas.height);
  if(isGolgi)gl.clearColor(0.831,0.769,0.627,1);else gl.clearColor(0.039,0.039,0.039,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  if(isGolgi)gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  else gl.blendFunc(gl.SRC_ALPHA,gl.ONE); // additive

  gl.useProgram(prog);
  gl.uniform2f(uRes,gl.canvas.width,gl.canvas.height);
  setColorUniforms();
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,neuronTex);gl.uniform1i(uNeuronTex,0);

  gl.bindVertexArray(vao);
  gl.drawElementsInstanced(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0,segN);
  gl.bindVertexArray(null);

  // Bloom overlay (CSS-blurred canvas2d copy)
  if(!isGolgi&&P.bloomIntensity>0.01){
    bloomEl.style.opacity=P.bloomIntensity;
    if(fc%4===0){
      bloomCtx2.clearRect(0,0,bloomEl.width,bloomEl.height);
      bloomCtx2.drawImage(gl.canvas,0,0,bloomEl.width,bloomEl.height);
    }
  }else{bloomEl.style.opacity=0;}
}

// ======================== INIT ========================
function fullInit(){
  const w=innerWidth,h=innerHeight;
  if(!initGL())return;
  bloomEl.width=w/4|0;bloomEl.height=h/4|0;
  generate(w,h);
  uploadStatic();
  document.getElementById('seed').value=seed;
  requestAnimationFrame(frame);
}

function regen(){
  const w=gl.canvas.width,h=gl.canvas.height;
  generate(w,h);uploadStatic();
}

window.addEventListener('resize',()=>{
  const w=innerWidth,h=innerHeight;
  gl.canvas.width=w;gl.canvas.height=h;
  bloomEl.width=w/4|0;bloomEl.height=h/4|0;
  regen();
});

// ======================== UI ========================
function bs(id,k,vid,p){const e=document.getElementById(id),v=document.getElementById(vid);e.addEventListener('input',()=>{P[k]=p?p(e.value):parseFloat(e.value);v.textContent=e.value;});}
window.addEventListener('DOMContentLoaded',()=>{
  bs('cn','neuronCount','vn',v=>+v);bs('cd','branchDepth','vd',v=>+v);bs('css','branchSpread','vs',v=>+v);
  bs('cl2','lineDensity','vl');bs('csp','lightSpeed','vsp');bs('cg2','glowWidth','vg',v=>+v);
  bs('cdc','decayRate','vdc');bs('cb','bloomIntensity','vb');
  ['cn','cd','css','cl2'].forEach(id=>document.getElementById(id).addEventListener('change',regen));
  document.getElementById('cm').addEventListener('change',e=>{colorMode=+e.target.value;regen();});
  document.getElementById('sr2').addEventListener('click',()=>{seed=Math.random()*999999|0;document.getElementById('seed').value=seed;regen();});
  document.getElementById('sp').addEventListener('click',()=>{seed=Math.max(0,seed-1);document.getElementById('seed').value=seed;regen();});
  document.getElementById('sn').addEventListener('click',()=>{seed++;document.getElementById('seed').value=seed;regen();});
  document.getElementById('seed').addEventListener('change',e=>{seed=parseInt(e.target.value)||0;regen();});
  document.getElementById('rg').addEventListener('click',()=>{seed=Math.random()*999999|0;document.getElementById('seed').value=seed;regen();});
  document.getElementById('rs').addEventListener('click',()=>{
    P={...D};colorMode=0;document.getElementById('cm').value='0';
    [['cn',D.neuronCount,'vn'],['cd',D.branchDepth,'vd'],['css',D.branchSpread,'vs'],['cl2',D.lineDensity,'vl'],['csp',D.lightSpeed,'vsp'],['cg2',D.glowWidth,'vg'],['cdc',D.decayRate,'vdc'],['cb',D.bloomIntensity,'vb']].forEach(([id,v,vid])=>{document.getElementById(id).value=v;document.getElementById(vid).textContent=v;});
    regen();
  });
  document.getElementById('dl').addEventListener('click',()=>{gl.canvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='neural-scintillation-'+seed+'.png';a.click();});});
  document.getElementById('tog').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('hidden'));
  fullInit();
});
</script>
